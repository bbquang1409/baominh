<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🔷 Shapes · Baby English</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FFFDF7;
      --dark: #2B2B2B;
      --header-h: 64px;
      --tab-h: 64px;
      --accent: #C77DFF;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; flex-direction: column;
      overflow-x: hidden;
    }

    /* HEADER */
    .header {
      height: var(--header-h);
      background: linear-gradient(135deg, #F8F0FF, #EDE0FF);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .header-back { text-decoration:none; font-size:26px; }
    .header-title { font-family:'Fredoka One',cursive; font-size:1.5rem; color:var(--dark); }
    .header-star  { font-size:26px; }

    /* TABS */
    .tabs {
      display:flex; background:#fff;
      border-bottom:3px solid #EEE;
      position:sticky; top:var(--header-h); z-index:99;
    }
    .tab-btn {
      flex:1; height:var(--tab-h); border:none; background:transparent;
      font-family:'Fredoka One',cursive; font-size:1.05rem; color:#AAA;
      cursor:pointer; border-bottom:4px solid transparent;
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition: color .2s, border-bottom .2s;
    }
    .tab-btn.active { color:var(--dark); border-bottom:4px solid var(--accent); }

    .panel { display:none; }
    .panel.active { display:block; }

    /* TAB 1 — GRID */
    .grid-panel { padding: 16px 14px 40px; }
    .grid-intro {
      text-align:center; font-size:0.88rem; color:#999;
      font-weight:700; margin-bottom:14px; letter-spacing:0.5px;
    }
    .shape-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      max-width: 480px;
      margin: 0 auto;
    }
    .shape-tile {
      border-radius: 24px;
      padding: 22px 12px 18px;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      cursor: pointer; border: none;
      user-select: none; -webkit-tap-highlight-color: transparent;
      box-shadow: 0 6px 0 rgba(0,0,0,0.13), 0 10px 24px rgba(0,0,0,0.08);
      transition: transform .12s, box-shadow .12s;
    }
    .shape-tile:active {
      transform: translateY(5px) scale(0.96);
      box-shadow: 0 1px 0 rgba(0,0,0,0.13), 0 4px 12px rgba(0,0,0,0.08);
    }

    /* SVG shape inside tile */
    .shape-svg {
      width: 72px; height: 72px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.18));
      flex-shrink: 0;
    }

    .shape-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .shape-example {
      font-size: 0.82rem;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.14) rotate(-4deg); }
      65%  { transform: scale(0.94) rotate(3deg); }
      100% { transform: scale(1); }
    }
    .shape-tile.speaking { animation: pop .5s ease; }

    /* TAB 2 — FLASHCARD */
    .flash-panel {
      padding: 16px 20px 40px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .progress-wrap { width:100%; max-width:400px; }
    .progress-track { height:10px; background:#EEE; border-radius:10px; overflow:hidden; }
    .progress-fill  { height:100%; border-radius:10px; transition:width .4s ease; }
    .progress-label { text-align:right; font-family:'Fredoka One',cursive; font-size:0.9rem; color:#BBB; margin-top:4px; }

    .flash-card {
      width:100%; max-width:340px;
      border-radius: 40px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 36px 24px 28px;
      gap: 14px;
      min-height: 360px;
      box-shadow: 0 8px 0 rgba(0,0,0,0.13), 0 20px 50px rgba(0,0,0,0.12);
      position: relative; overflow: hidden;
      cursor: pointer; user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background .4s;
    }
    .flash-card::before {
      content:'';
      position:absolute; top:-25%; left:-15%;
      width:55%; height:55%;
      background: radial-gradient(circle, rgba(255,255,255,0.32) 0%, transparent 70%);
      pointer-events:none;
    }

    /* Big shape SVG in flashcard */
    .fc-shape-wrap {
      width: 150px; height: 150px;
      display: flex; align-items: center; justify-content: center;
      animation: floatShape 3s ease-in-out infinite;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.22));
    }
    @keyframes floatShape {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-12px) scale(1.05); }
    }

    .fc-shape-name {
      font-family: 'Fredoka One', cursive;
      font-size: 2.6rem;
      color: white;
      text-shadow: 0 4px 10px rgba(0,0,0,0.2);
      line-height: 1;
    }
    .fc-example {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.85);
      text-align: center;
    }
    .tap-hint {
      position:absolute; bottom:14px;
      font-size:0.78rem; color:rgba(255,255,255,0.55);
      font-weight:700; letter-spacing:0.5px;
    }

    @keyframes flipIn {
      0%   { transform: rotateY(90deg) scale(0.8); opacity:0; }
      100% { transform: rotateY(0)     scale(1);   opacity:1; }
    }
    .flash-card.flip { animation: flipIn .35s ease-out; }
    @keyframes speakPulse {
      0%,100% { box-shadow: 0 8px 0 rgba(0,0,0,0.13), 0 20px 50px rgba(0,0,0,0.12); }
      50%      { box-shadow: 0 8px 0 rgba(0,0,0,0.13), 0 20px 60px rgba(0,0,0,0.2), 0 0 0 14px rgba(255,255,255,0.28); }
    }
    .flash-card.speaking-pulse { animation: speakPulse .6s ease; }

    .speak-btn {
      width:100%; max-width:340px; height:68px;
      border-radius:22px; border:none;
      background: linear-gradient(135deg,#C77DFF,#9B41E8);
      font-family:'Fredoka One',cursive; font-size:1.35rem;
      color:white; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:10px;
      box-shadow: 0 5px 0 #6A0DAD, 0 8px 24px rgba(180,100,255,0.3);
      transition: transform .12s, box-shadow .12s;
    }
    .speak-btn:active { transform:translateY(4px); box-shadow:0 1px 0 #6A0DAD; }
    @keyframes btnBounce {
      0%,100% { transform:scale(1); }
      30%      { transform:scale(1.07); }
      60%      { transform:scale(0.96); }
    }
    .speak-btn.active-anim { animation: btnBounce .45s ease; }

    .flash-nav { display:flex; gap:16px; width:100%; max-width:340px; }
    .nav-btn {
      flex:1; height:58px; border-radius:18px; border:none;
      font-family:'Fredoka One',cursive; font-size:1rem;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
      box-shadow:0 4px 0 rgba(0,0,0,0.10);
      transition: transform .12s, box-shadow .12s;
    }
    .nav-btn:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,0.10); }
    .btn-prev { background:#EEE; color:#666; }
    .btn-next { background:#5BA4F5; color:white; box-shadow:0 4px 0 #2A6FCC; }
  </style>
</head>
<body>

  <header class="header">
    <a class="header-back" href="index.html">&#127968;</a>
    <span class="header-title">&#128311; Shapes</span>
    <span class="header-star">&#11088;</span>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" id="tab1-btn" onclick="switchTab(1)">&#128193; All Shapes</button>
    <button class="tab-btn"        id="tab2-btn" onclick="switchTab(2)">&#127183; Flashcard</button>
  </nav>

  <div class="panel active grid-panel" id="panel1">
    <p class="grid-intro">TAP A SHAPE TO HEAR IT! &#128266;</p>
    <div class="shape-grid" id="shapeGrid"></div>
  </div>

  <div class="panel flash-panel" id="panel2">
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:11.1%"></div>
      </div>
      <div class="progress-label" id="progressLabel">1 / 9</div>
    </div>
    <div class="flash-card" id="flashCard" onclick="speakCurrent()">
      <div class="fc-shape-wrap" id="fcShapeWrap"></div>
      <div class="fc-shape-name" id="fcName">Circle</div>
      <div class="fc-example"   id="fcExample"></div>
      <div class="tap-hint">&#128070; tap to hear</div>
    </div>
    <button class="speak-btn" id="speakBtn" onclick="speakCurrent()">&#128266; Listen</button>
    <div class="flash-nav">
      <button class="nav-btn btn-prev" onclick="prevShape()">&#9664; Back</button>
      <button class="nav-btn btn-next" onclick="nextShape()">Next &#9654;</button>
    </div>
  </div>

  <script>
    // Each shape has: name, bg gradient, SVG path data, fill color, example text
    const SHAPES = [
      {
        name: 'Circle',
        bg: ['#C77DFF','#6A0DAD'],
        fill: 'rgba(255,255,255,0.9)',
        svg: '<circle cx="60" cy="60" r="52" />',
        example: '&#127775; Sun  &#9679; Ball  &#127968; Clock',
        vb: '0 0 120 120'
      },
      {
        name: 'Square',
        bg: ['#5BA4F5','#0A3D91'],
        fill: 'rgba(255,255,255,0.9)',
        svg: '<rect x="10" y="10" width="100" height="100" rx="8" />',
        example: '&#127381; Box  &#9726; Window  &#127384; Frame',
        vb: '0 0 120 120'
      },
      {
        name: 'Triangle',
        bg: ['#FF6B6B','#C0392B'],
        fill: 'rgba(255,255,255,0.9)',
        svg: '<polygon points="60,8 112,112 8,112" />',
        example: '&#9650; Arrow  &#127869; Pizza  &#127956; Mountain',
        vb: '0 0 120 120'
      },
      {
        name: 'Rectangle',
        bg: ['#6BCB77','#1A7A35'],
        fill: 'rgba(255,255,255,0.9)',
        svg: '<rect x="6" y="28" width="108" height="64" rx="8" />',
        example: '&#128214; Book  &#128247; Phone  &#127968; Door',
        vb: '0 0 120 120'
      },
      {
        name: 'Oval',
        bg: ['#FFB347','#CC6600'],
        fill: 'rgba(255,255,255,0.9)',
        svg: '<ellipse cx="60" cy="60" rx="54" ry="36" />',
        example: '&#129381; Egg  &#127825; Berry  &#128065; Eye',
        vb: '0 0 120 120'
      },
      {
        name: 'Star',
        bg: ['#FFD93D','#997A00'],
        fill: 'rgba(255,255,255,0.9)',
        svg: '<polygon points="60,5 74,42 114,42 82,65 94,102 60,80 26,102 38,65 6,42 46,42" />',
        example: '&#11088; Star  &#127752; Badge  &#9733; Award',
        vb: '0 0 120 120'
      },
      {
        name: 'Heart',
        bg: ['#F76BB7','#8B0050'],
        fill: 'rgba(255,255,255,0.9)',
        svg: '<path d="M60,100 C20,72 4,50 4,34 C4,18 16,8 30,8 C42,8 54,16 60,26 C66,16 78,8 90,8 C104,8 116,18 116,34 C116,50 100,72 60,100Z" />',
        example: '&#10084; Love  &#129505; Balloon  &#129724; Cookie',
        vb: '0 0 120 120'
      },
      {
        name: 'Diamond',
        bg: ['#3EC9A7','#0E6B52'],
        fill: 'rgba(255,255,255,0.9)',
        svg: '<polygon points="60,6 114,60 60,114 6,60" />',
        example: '&#128142; Gem  &#9830; Card  &#129523; Kite',
        vb: '0 0 120 120'
      },
      {
        name: 'Pentagon',
        bg: ['#FF8E53','#923B00'],
        fill: 'rgba(255,255,255,0.9)',
        svg: '<polygon points="60,6 113,44 92,108 28,108 7,44" />',
        example: '&#9977; Field  &#127963; Home  &#128736; Sign',
        vb: '0 0 120 120'
      },
    ];

    let current = 0;

    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US'; u.rate = 0.80; u.pitch = 1.15;
      window.speechSynthesis.speak(u);
    }

    function makeSVG(s, size) {
      return `<svg viewBox="${s.vb}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">
        <g fill="${s.fill}" filter="url(#sh)">
          <defs><filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.25"/></filter></defs>
          ${s.svg}
        </g>
      </svg>`;
    }

    function speakCurrent() {
      speak(SHAPES[current].name);
      const card = document.getElementById('flashCard');
      card.classList.remove('speaking-pulse'); void card.offsetWidth;
      card.classList.add('speaking-pulse');
      setTimeout(() => card.classList.remove('speaking-pulse'), 700);
      const btn = document.getElementById('speakBtn');
      btn.classList.remove('active-anim'); void btn.offsetWidth;
      btn.classList.add('active-anim');
      setTimeout(() => btn.classList.remove('active-anim'), 500);
    }

    function buildGrid() {
      const grid = document.getElementById('shapeGrid');
      SHAPES.forEach((s, i) => {
        const tile = document.createElement('button');
        tile.className = 'shape-tile';
        tile.style.background = `linear-gradient(145deg, ${s.bg[0]}, ${s.bg[1]})`;
        tile.innerHTML = `
          <div class="shape-svg">${makeSVG(s, 72)}</div>
          <span class="shape-name">${s.name}</span>
          <span class="shape-example">${s.example}</span>
        `;
        tile.addEventListener('click', () => {
          speak(s.name);
          tile.classList.remove('speaking'); void tile.offsetWidth;
          tile.classList.add('speaking');
          setTimeout(() => tile.classList.remove('speaking'), 600);
          current = i;
        });
        grid.appendChild(tile);
      });
    }

    function updateCard(animate = true) {
      const s = SHAPES[current];
      document.getElementById('fcShapeWrap').innerHTML = makeSVG(s, 150);
      document.getElementById('fcName').textContent    = s.name;
      document.getElementById('fcExample').innerHTML   = s.example;
      document.getElementById('flashCard').style.background = `linear-gradient(145deg, ${s.bg[0]}, ${s.bg[1]})`;
      const pct = ((current + 1) / SHAPES.length * 100).toFixed(1);
      document.getElementById('progressFill').style.width      = pct + '%';
      document.getElementById('progressFill').style.background = `linear-gradient(90deg, ${s.bg[0]}, ${s.bg[1]})`;
      document.getElementById('progressLabel').textContent     = `${current + 1} / ${SHAPES.length}`;
      if (animate) {
        const card = document.getElementById('flashCard');
        card.classList.remove('flip'); void card.offsetWidth; card.classList.add('flip');
      }
    }

    function nextShape() { current = (current + 1) % SHAPES.length; updateCard(); setTimeout(speakCurrent, 350); }
    function prevShape() { current = (current - 1 + SHAPES.length) % SHAPES.length; updateCard(); setTimeout(speakCurrent, 350); }

    function switchTab(n) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`panel${n}`).classList.add('active');
      document.getElementById(`tab${n}-btn`).classList.add('active');
      if (n === 2) { updateCard(false); setTimeout(speakCurrent, 400); }
    }

    buildGrid();
    updateCard(false);
  </script>
</body>
</html>
