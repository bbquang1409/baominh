<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🔤 Alphabet · Baby English</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════
       TOKENS
    ══════════════════════════════════════════ */
    :root {
      --bg: #FFFDF7;
      --dark: #2B2B2B;
      --radius: 24px;
      --tab-h: 64px;
      --header-h: 64px;

      /* 26 letter colors — one per letter */
      --c0:#FF6B6B; --c1:#FF8E53; --c2:#FFB347;
      --c3:#FFD93D; --c4:#C8E63C; --c5:#6BCB77;
      --c6:#3EC9A7; --c7:#3EC9D6; --c8:#6DD5FA;
      --c9:#5BA4F5; --c10:#7B61FF; --c11:#C77DFF;
      --c12:#F76BB7; --c13:#FF6B6B; --c14:#FF8E53;
      --c15:#FFB347; --c16:#FFD93D; --c17:#C8E63C;
      --c18:#6BCB77; --c19:#3EC9A7; --c20:#3EC9D6;
      --c21:#6DD5FA; --c22:#5BA4F5; --c23:#7B61FF;
      --c24:#C77DFF; --c25:#F76BB7;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════ */
    .header {
      height: var(--header-h);
      background: linear-gradient(135deg, #AEE6FF, #D4FFE8);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .header-back {
      text-decoration: none;
      font-size: 26px;
      line-height: 1;
    }
    .header-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: var(--dark);
      letter-spacing: 0.5px;
    }
    .header-star { font-size: 26px; }

    /* ══════════════════════════════════════════
       TABS
    ══════════════════════════════════════════ */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 3px solid #EEE;
      position: sticky;
      top: var(--header-h);
      z-index: 99;
    }
    .tab-btn {
      flex: 1;
      height: var(--tab-h);
      border: none;
      background: transparent;
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem;
      color: #AAA;
      cursor: pointer;
      transition: color .2s, border-bottom .2s;
      border-bottom: 4px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .tab-btn.active {
      color: var(--dark);
      border-bottom: 4px solid #5BA4F5;
    }

    /* ══════════════════════════════════════════
       PANELS
    ══════════════════════════════════════════ */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ══════════════════════════════════════════
       TAB 1 — GRID
    ══════════════════════════════════════════ */
    .grid-panel {
      padding: 20px 14px 40px;
    }
    .grid-intro {
      text-align: center;
      font-size: 0.9rem;
      color: #999;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .alphabet-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      max-width: 480px;
      margin: 0 auto;
    }

    .letter-tile {
      aspect-ratio: 1;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 5px 0 rgba(0,0,0,0.15), 0 8px 20px rgba(0,0,0,0.08);
      transition: transform .12s, box-shadow .12s;
      position: relative;
      overflow: hidden;
      border: none;
      background: white;
    }
    .letter-tile::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.2);
      border-radius: inherit;
      pointer-events: none;
    }
    .letter-tile:active {
      transform: translateY(4px) scale(0.96);
      box-shadow: 0 1px 0 rgba(0,0,0,0.15), 0 4px 10px rgba(0,0,0,0.08);
    }
    .letter-tile .big-letter {
      font-family: 'Fredoka One', cursive;
      font-size: 2.2rem;
      line-height: 1;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .letter-tile .small-letter {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      line-height: 1;
      color: rgba(255,255,255,0.85);
    }
    .letter-tile .tile-emoji {
      font-size: 1.3rem;
      margin-top: 2px;
    }

    /* pop animation on speak */
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.15) rotate(-4deg); }
      70%  { transform: scale(0.95) rotate(3deg); }
      100% { transform: scale(1); }
    }
    .letter-tile.speaking { animation: pop .5s ease; }

    /* ══════════════════════════════════════════
       TAB 2 — FLASHCARD
    ══════════════════════════════════════════ */
    .flash-panel {
      padding: 20px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* progress dots */
    .progress-bar {
      width: 100%;
      max-width: 440px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #DDD;
      transition: background .3s, transform .3s;
    }
    .dot.done { transform: scale(1.2); }

    /* card */
    .flash-card {
      width: 100%;
      max-width: 340px;
      aspect-ratio: 3/4;
      border-radius: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      box-shadow: 0 8px 0 rgba(0,0,0,0.14), 0 16px 40px rgba(0,0,0,0.10);
      position: relative;
      overflow: hidden;
      transition: background .4s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    /* shine overlay */
    .flash-card::before {
      content: '';
      position: absolute;
      top: -30%; left: -20%;
      width: 60%; height: 60%;
      background: radial-gradient(circle, rgba(255,255,255,0.35) 0%, transparent 70%);
      pointer-events: none;
    }

    .flash-letter-big {
      font-family: 'Fredoka One', cursive;
      font-size: 7rem;
      color: white;
      text-shadow: 0 4px 12px rgba(0,0,0,0.18);
      line-height: 1;
      animation: floatLetter 3s ease-in-out infinite;
    }
    @keyframes floatLetter {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .flash-letter-small {
      font-family: 'Fredoka One', cursive;
      font-size: 2.8rem;
      color: rgba(255,255,255,0.8);
      line-height: 1;
    }

    .flash-emoji {
      font-size: 4rem;
      margin-top: 12px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
      animation: floatEmoji 2.5s ease-in-out infinite;
      animation-delay: .4s;
    }
    @keyframes floatEmoji {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-6px) rotate(3deg); }
    }

    .flash-word {
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      color: rgba(255,255,255,0.95);
      margin-top: 8px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    /* tap hint */
    .tap-hint {
      position: absolute;
      bottom: 18px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.65);
      font-weight: 700;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* card flip animation */
    @keyframes flipIn {
      0%   { transform: rotateY(90deg) scale(0.8); opacity: 0; }
      100% { transform: rotateY(0deg)  scale(1);   opacity: 1; }
    }
    .flash-card.flip { animation: flipIn .35s ease-out; }

    /* speak pulse */
    @keyframes speakPulse {
      0%,100% { box-shadow: 0 8px 0 rgba(0,0,0,0.14), 0 16px 40px rgba(0,0,0,0.10); }
      50%      { box-shadow: 0 8px 0 rgba(0,0,0,0.14), 0 16px 60px rgba(0,0,0,0.22), 0 0 0 12px rgba(255,255,255,0.3); }
    }
    .flash-card.speaking-pulse { animation: speakPulse .6s ease; }

    /* nav buttons */
    .flash-nav {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 340px;
    }
    .nav-btn {
      flex: 1;
      height: 62px;
      border-radius: 20px;
      border: none;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .12s, box-shadow .12s;
      box-shadow: 0 4px 0 rgba(0,0,0,0.12);
    }
    .nav-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }
    .btn-prev { background: #EEE; color: #555; }
    .btn-next { background: #5BA4F5; color: white; }

    /* speak big button */
    .speak-btn {
      width: 100%;
      max-width: 340px;
      height: 70px;
      border-radius: 24px;
      border: none;
      background: linear-gradient(135deg, #FFD93D, #FFB347);
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
      color: var(--dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 5px 0 #E0922A, 0 8px 20px rgba(255,179,71,0.35);
      transition: transform .12s, box-shadow .12s;
    }
    .speak-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #E0922A, 0 4px 10px rgba(255,179,71,0.25);
    }
    @keyframes speakBtnBounce {
      0%,100% { transform: scale(1); }
      30%      { transform: scale(1.06); }
      60%      { transform: scale(0.97); }
    }
    .speak-btn.active-speak { animation: speakBtnBounce .5s ease; }

    /* counter */
    .flash-counter {
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      color: #BBB;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a class="header-back" href="index.html">🏠</a>
    <span class="header-title">🔤 Alphabet</span>
    <span class="header-star">⭐</span>
  </header>

  <!-- TABS -->
  <nav class="tabs">
    <button class="tab-btn active" id="tab1-btn" onclick="switchTab(1)">
      🗂️ All Letters
    </button>
    <button class="tab-btn" id="tab2-btn" onclick="switchTab(2)">
      🃏 Flashcard
    </button>
  </nav>

  <!-- ════ TAB 1 — GRID ════ -->
  <div class="panel active grid-panel" id="panel1">
    <p class="grid-intro">TAP A LETTER TO HEAR IT! 🔊</p>
    <div class="alphabet-grid" id="alphabetGrid"></div>
  </div>

  <!-- ════ TAB 2 — FLASHCARD ════ -->
  <div class="panel flash-panel" id="panel2">
    <div class="progress-bar" id="progressBar"></div>
    <div class="flash-card" id="flashCard" onclick="speakCurrentLetter()">
      <div class="flash-letter-big" id="fcBig">A</div>
      <div class="flash-letter-small" id="fcSmall">a</div>
      <div class="flash-emoji" id="fcEmoji">🍎</div>
      <div class="flash-word" id="fcWord">Apple</div>
      <div class="tap-hint">👆 tap to hear</div>
    </div>

    <div class="speak-btn" id="speakBtn" onclick="speakCurrentLetter()">
      🔊 Listen
    </div>

    <div class="flash-nav">
      <button class="nav-btn btn-prev" onclick="prevLetter()">◀ Back</button>
      <button class="nav-btn btn-next" onclick="nextLetter()">Next ▶</button>
    </div>

    <div class="flash-counter" id="flashCounter">1 / 26</div>
  </div>

  <script>
    /* ═══════════════════════════════════════
       DATA
    ═══════════════════════════════════════ */
    const LETTERS = [
      { letter:'A', emoji:'🍎', word:'Apple'     },
      { letter:'B', emoji:'🦋', word:'Butterfly'  },
      { letter:'C', emoji:'🐱', word:'Cat'        },
      { letter:'D', emoji:'🐶', word:'Dog'        },
      { letter:'E', emoji:'🥚', word:'Egg'        },
      { letter:'F', emoji:'🐟', word:'Fish'       },
      { letter:'G', emoji:'🍇', word:'Grape'      },
      { letter:'H', emoji:'🏠', word:'House'      },
      { letter:'I', emoji:'🍦', word:'Ice Cream'  },
      { letter:'J', emoji:'🤹', word:'Juggle'     },
      { letter:'K', emoji:'🪁', word:'Kite'       },
      { letter:'L', emoji:'🦁', word:'Lion'       },
      { letter:'M', emoji:'🐒', word:'Monkey'     },
      { letter:'N', emoji:'🌙', word:'Night'      },
      { letter:'O', emoji:'🐙', word:'Octopus'   },
      { letter:'P', emoji:'🐧', word:'Penguin'   },
      { letter:'Q', emoji:'👑', word:'Queen'      },
      { letter:'R', emoji:'🌈', word:'Rainbow'   },
      { letter:'S', emoji:'⭐', word:'Star'       },
      { letter:'T', emoji:'🐯', word:'Tiger'      },
      { letter:'U', emoji:'☂️', word:'Umbrella'  },
      { letter:'V', emoji:'🎻', word:'Violin'     },
      { letter:'W', emoji:'🐋', word:'Whale'      },
      { letter:'X', emoji:'🎸', word:'Xylophone' },
      { letter:'Y', emoji:'🧶', word:'Yarn'       },
      { letter:'Z', emoji:'🦓', word:'Zebra'      },
    ];

    const COLORS = [
      '#FF6B6B','#FF8E53','#FFB347','#FFD93D','#C8E63C','#6BCB77',
      '#3EC9A7','#3EC9D6','#6DD5FA','#5BA4F5','#7B61FF','#C77DFF',
      '#F76BB7','#FF6B6B','#FF8E53','#FFB347','#FFD93D','#C8E63C',
      '#6BCB77','#3EC9A7','#3EC9D6','#6DD5FA','#5BA4F5','#7B61FF',
      '#C77DFF','#F76BB7'
    ];

    const DARK_COLORS = [
      '#D63031','#D4541A','#E0922A','#E6B800','#96AA10','#2E9E50',
      '#1A9E80','#1A9EAA','#1A9ED4','#1A5FCC','#4A2ECC','#8A30CC',
      '#C41A7A','#D63031','#D4541A','#E0922A','#E6B800','#96AA10',
      '#2E9E50','#1A9E80','#1A9EAA','#1A9ED4','#1A5FCC','#4A2ECC',
      '#8A30CC','#C41A7A'
    ];

    let currentIndex = 0;

    /* ═══════════════════════════════════════
       SPEECH
    ═══════════════════════════════════════ */
    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = 0.82;
      u.pitch = 1.15;
      window.speechSynthesis.speak(u);
    }

    /* ═══════════════════════════════════════
       TAB 1 — BUILD GRID
    ═══════════════════════════════════════ */
    function buildGrid() {
      const grid = document.getElementById('alphabetGrid');
      LETTERS.forEach((item, i) => {
        const tile = document.createElement('button');
        tile.className = 'letter-tile';
        tile.style.background = `linear-gradient(145deg, ${COLORS[i]}, ${DARK_COLORS[i]})`;
        tile.innerHTML = `
          <span class="big-letter">${item.letter}</span>
          <span class="small-letter">${item.letter.toLowerCase()}</span>
          <span class="tile-emoji">${item.emoji}</span>
        `;
        tile.addEventListener('click', () => {
          speak(`${item.letter}. ${item.word}`);
          tile.classList.remove('speaking');
          void tile.offsetWidth;
          tile.classList.add('speaking');
          setTimeout(() => tile.classList.remove('speaking'), 600);
          // jump to flashcard
          currentIndex = i;
        });
        grid.appendChild(tile);
      });
    }

    /* ═══════════════════════════════════════
       TAB 2 — FLASHCARD
    ═══════════════════════════════════════ */
    function buildProgressBar() {
      const bar = document.getElementById('progressBar');
      LETTERS.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.id = `dot${i}`;
        bar.appendChild(dot);
      });
    }

    function updateFlashCard(animate = true) {
      const item = LETTERS[currentIndex];
      const color = COLORS[currentIndex];
      const dark  = DARK_COLORS[currentIndex];
      const card  = document.getElementById('flashCard');

      document.getElementById('fcBig').textContent   = item.letter;
      document.getElementById('fcSmall').textContent = item.letter.toLowerCase();
      document.getElementById('fcEmoji').textContent = item.emoji;
      document.getElementById('fcWord').textContent  = item.word;
      document.getElementById('flashCounter').textContent = `${currentIndex + 1} / 26`;

      card.style.background = `linear-gradient(145deg, ${color} 0%, ${dark} 100%)`;

      // progress dots
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.style.background = i <= currentIndex ? COLORS[i] : '#DDD';
        d.classList.toggle('done', i <= currentIndex);
      });

      if (animate) {
        card.classList.remove('flip');
        void card.offsetWidth;
        card.classList.add('flip');
      }
    }

    function speakCurrentLetter() {
      const item = LETTERS[currentIndex];
      speak(`${item.letter}. ${item.word}`);

      const card = document.getElementById('flashCard');
      card.classList.remove('speaking-pulse');
      void card.offsetWidth;
      card.classList.add('speaking-pulse');
      setTimeout(() => card.classList.remove('speaking-pulse'), 700);

      const btn = document.getElementById('speakBtn');
      btn.classList.remove('active-speak');
      void btn.offsetWidth;
      btn.classList.add('active-speak');
      setTimeout(() => btn.classList.remove('active-speak'), 600);
    }

    function nextLetter() {
      currentIndex = (currentIndex + 1) % 26;
      updateFlashCard();
      setTimeout(speakCurrentLetter, 350);
    }

    function prevLetter() {
      currentIndex = (currentIndex - 1 + 26) % 26;
      updateFlashCard();
      setTimeout(speakCurrentLetter, 350);
    }

    /* ═══════════════════════════════════════
       TAB SWITCH
    ═══════════════════════════════════════ */
    function switchTab(n) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`panel${n}`).classList.add('active');
      document.getElementById(`tab${n}-btn`).classList.add('active');
      if (n === 2) {
        updateFlashCard(false);
        setTimeout(speakCurrentLetter, 400);
      }
    }

    /* ═══════════════════════════════════════
       INIT
    ═══════════════════════════════════════ */
    buildGrid();
    buildProgressBar();
    updateFlashCard(false);
  </script>

</body>
</html>
