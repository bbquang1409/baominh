<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>🔤 Alphabet · Baby English</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg:#FFFDF7; --dark:#2B2B2B; --header-h:64px; --tab-h:60px; }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Nunito',sans-serif; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; overflow-x:hidden; }

    .header { height:var(--header-h); background:linear-gradient(135deg,#AEE6FF,#D4F5FF); display:flex; align-items:center; justify-content:space-between; padding:0 16px; position:sticky; top:0; z-index:100; box-shadow:0 2px 14px rgba(0,0,0,.10); }
    .back-btn { text-decoration:none; display:flex; align-items:center; gap:6px; background:white; border-radius:14px; padding:7px 14px 7px 10px; font-family:'Fredoka One',cursive; font-size:1rem; color:var(--dark); box-shadow:0 2px 8px rgba(0,0,0,.12); }
    .header-title { font-family:'Fredoka One',cursive; font-size:1.5rem; color:var(--dark); }

    .tabs { display:flex; background:#fff; border-bottom:3px solid #EEE; position:sticky; top:var(--header-h); z-index:99; }
    .tab-btn { flex:1; height:var(--tab-h); border:none; background:transparent; font-family:'Fredoka One',cursive; font-size:1.05rem; color:#AAA; cursor:pointer; border-bottom:4px solid transparent; display:flex; align-items:center; justify-content:center; gap:8px; transition:color .2s,border-bottom .2s; }
    .tab-btn.active { color:var(--dark); border-bottom:4px solid #5BA4F5; }

    .panel { display:none; }
    .panel.active { display:block; }
    #panel2 { display:none; flex-direction:column; min-height:calc(100vh - var(--header-h) - var(--tab-h)); }
    #panel2.active { display:flex; }

    /* TAB 1 */
    #panel1 { padding:16px 16px 48px; }
    .letter-card { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; width:100%; min-height:300px; border-radius:28px; margin-bottom:16px; padding:32px 16px 28px; border:none; cursor:pointer; position:relative; overflow:hidden; box-shadow:0 6px 0 rgba(0,0,0,.14),0 10px 28px rgba(0,0,0,.10); transition:transform .13s,box-shadow .13s; -webkit-tap-highlight-color:transparent; }
    .letter-card::before { content:''; position:absolute; top:-28%; left:-18%; width:56%; height:56%; background:radial-gradient(circle,rgba(255,255,255,.22) 0%,transparent 70%); pointer-events:none; }
    .letter-card:active { transform:translateY(4px) scale(.97); box-shadow:0 2px 0 rgba(0,0,0,.14),0 4px 10px rgba(0,0,0,.10); }
    .ac-upper { font-family:'Fredoka One',cursive; font-size:7rem; color:white; text-shadow:0 6px 14px rgba(0,0,0,.22); line-height:1; animation:floatUp 3s ease-in-out infinite; }
    @keyframes floatUp { 0%,100%{transform:translateY(0) rotate(-2deg);} 50%{transform:translateY(-10px) rotate(2deg);} }
    .ac-lower { font-family:'Fredoka One',cursive; font-size:2.8rem; color:rgba(255,255,255,.80); line-height:1; }
    .ac-emoji { font-size:3.2rem; line-height:1; filter:drop-shadow(0 3px 6px rgba(0,0,0,.15)); }
    .ac-word  { font-family:'Fredoka One',cursive; font-size:1.9rem; color:white; text-shadow:0 2px 6px rgba(0,0,0,.18); }
    .ac-hint  { font-size:.76rem; color:rgba(255,255,255,.48); font-weight:700; letter-spacing:.5px; margin-top:4px; }
    @keyframes popCard { 0%{transform:scale(1);} 35%{transform:scale(1.03) rotate(-1deg);} 65%{transform:scale(.98);} 100%{transform:scale(1);} }
    .letter-card.pop { animation:popCard .45s ease; }

    /* TAB 2 */
    .progress-wrap { padding:14px 20px 0; flex-shrink:0; }
    .progress-track { height:10px; background:#EEE; border-radius:10px; overflow:hidden; }
    .progress-fill  { height:100%; border-radius:10px; background:linear-gradient(90deg,#5BA4F5,#7B61FF); transition:width .4s ease; }
    .progress-label { text-align:right; font-family:'Fredoka One',cursive; font-size:.88rem; color:#BBB; margin-top:4px; }
    .flash-row { flex:1; display:flex; align-items:center; padding:12px 0; min-height:0; }
    .side-btn { flex-shrink:0; width:58px; height:100%; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; transition:opacity .15s,transform .12s; }
    .side-btn:active { opacity:.45; transform:scale(.88); }
    .side-pill { width:44px; height:88px; background:white; border-radius:16px; box-shadow:0 4px 0 rgba(0,0,0,.10),0 6px 16px rgba(0,0,0,.07); display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
    .flash-card { flex:1; margin:0 6px; border-radius:32px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:24px 16px; box-shadow:0 8px 0 rgba(0,0,0,.13),0 18px 48px rgba(0,0,0,.12); position:relative; overflow:hidden; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:background .4s; min-height:320px; max-height:480px; }
    .flash-card::before { content:''; position:absolute; top:-25%; left:-15%; width:55%; height:55%; background:radial-gradient(circle,rgba(255,255,255,.26) 0%,transparent 70%); pointer-events:none; }
    .fc-upper { font-family:'Fredoka One',cursive; font-size:6.5rem; color:white; text-shadow:0 6px 14px rgba(0,0,0,.22); line-height:1; animation:float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(-2deg);} 50%{transform:translateY(-10px) rotate(2deg);} }
    .fc-lower { font-family:'Fredoka One',cursive; font-size:2.6rem; color:rgba(255,255,255,.80); line-height:1; }
    .fc-emoji { font-size:3rem; filter:drop-shadow(0 3px 6px rgba(0,0,0,.15)); }
    .fc-word  { font-family:'Fredoka One',cursive; font-size:1.7rem; color:rgba(255,255,255,.92); }
    .fc-hint  { position:absolute; bottom:14px; font-size:.74rem; color:rgba(255,255,255,.42); font-weight:700; letter-spacing:.5px; }
    @keyframes flipIn { 0%{transform:rotateY(90deg) scale(.85);opacity:0;} 100%{transform:rotateY(0) scale(1);opacity:1;} }
    .flash-card.flip { animation:flipIn .33s ease-out; }
    @keyframes pulse { 0%,100%{box-shadow:0 8px 0 rgba(0,0,0,.13),0 18px 48px rgba(0,0,0,.12);} 50%{box-shadow:0 8px 0 rgba(0,0,0,.13),0 18px 56px rgba(0,0,0,.20),0 0 0 12px rgba(255,255,255,.26);} }
    .flash-card.pulse { animation:pulse .55s ease; }
    .listen-wrap { padding:0 20px 20px; flex-shrink:0; }
    .listen-btn { width:100%; height:64px; border-radius:20px; border:none; background:linear-gradient(135deg,#5BA4F5,#7B61FF); font-family:'Fredoka One',cursive; font-size:1.3rem; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 5px 0 #2A6FCC,0 8px 20px rgba(91,164,245,.28); transition:transform .12s,box-shadow .12s; }
    .listen-btn:active { transform:translateY(4px); box-shadow:0 1px 0 #2A6FCC; }
    @keyframes btnPop { 0%,100%{transform:scale(1);} 30%{transform:scale(1.06);} 60%{transform:scale(.97);} }
    .listen-btn.pop { animation:btnPop .4s ease; }
  </style>
</head>
<body>
<header class="header">
  <a class="back-btn" href="index.html">🏠 Home</a>
  <span class="header-title">🔤 Alphabet</span>
  <span style="font-size:26px">⭐</span>
</header>
<nav class="tabs">
  <button class="tab-btn active" id="tab1-btn" onclick="switchTab(1)">🗂️ All Letters</button>
  <button class="tab-btn"        id="tab2-btn" onclick="switchTab(2)">🃏 Flashcard</button>
</nav>
<div class="panel active" id="panel1"></div>
<div class="panel" id="panel2">
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="pFill" style="width:3.8%"></div></div>
    <div class="progress-label" id="pLabel">1 / 26</div>
  </div>
  <div class="flash-row">
    <button class="side-btn" onclick="go(-1)"><div class="side-pill">◀</div></button>
    <div class="flash-card" id="fCard" onclick="speakCurrent()">
      <div class="fc-upper" id="fUpper">A</div>
      <div class="fc-lower" id="fLower">a</div>
      <div class="fc-emoji" id="fEmoji">🍎</div>
      <div class="fc-word"  id="fWord">Apple</div>
      <div class="fc-hint">👆 tap to hear</div>
    </div>
    <button class="side-btn" onclick="go(1)"><div class="side-pill">▶</div></button>
  </div>
  <div class="listen-wrap">
    <button class="listen-btn" id="listenBtn" onclick="speakCurrent()">🔊 Listen</button>
  </div>
</div>
<script>
  var LETTERS = [
    {l:'A',emoji:'🍎',word:'Apple',    c:['#FF6B6B','#C0392B']},
    {l:'B',emoji:'🦋',word:'Butterfly',c:['#FF8E53','#923B00']},
    {l:'C',emoji:'🐱',word:'Cat',      c:['#FFD93D','#997A00']},
    {l:'D',emoji:'🐶',word:'Dog',      c:['#6BCB77','#1A7A35']},
    {l:'E',emoji:'🥚',word:'Egg',      c:['#3EC9A7','#0E6B52']},
    {l:'F',emoji:'🐟',word:'Fish',     c:['#6DD5FA','#0077B6']},
    {l:'G',emoji:'🍇',word:'Grape',    c:['#5BA4F5','#0A3D91']},
    {l:'H',emoji:'🏠',word:'House',    c:['#7B61FF','#3A0088']},
    {l:'I',emoji:'🍦',word:'Ice Cream',c:['#C77DFF','#6A0DAD']},
    {l:'J',emoji:'🤹',word:'Juggle',   c:['#F76BB7','#8B0050']},
    {l:'K',emoji:'🪁',word:'Kite',     c:['#FF6B6B','#C0392B']},
    {l:'L',emoji:'🦁',word:'Lion',     c:['#FFB347','#E0922A']},
    {l:'M',emoji:'🐒',word:'Monkey',   c:['#6BCB77','#2E9E50']},
    {l:'N',emoji:'🌙',word:'Night',    c:['#5BA4F5','#1A5FCC']},
    {l:'O',emoji:'🐙',word:'Octopus',  c:['#FF8E53','#D4541A']},
    {l:'P',emoji:'🐧',word:'Penguin',  c:['#3EC9D6','#007B8A']},
    {l:'Q',emoji:'👑',word:'Queen',    c:['#FFD93D','#CC8800']},
    {l:'R',emoji:'🌈',word:'Rainbow',  c:['#FF6B6B','#900000']},
    {l:'S',emoji:'⭐',word:'Star',     c:['#C8E63C','#7A9900']},
    {l:'T',emoji:'🐯',word:'Tiger',    c:['#FF8E53','#923B00']},
    {l:'U',emoji:'☂️',word:'Umbrella', c:['#C77DFF','#5A189A']},
    {l:'V',emoji:'🎻',word:'Violin',   c:['#6BCB77','#1B4332']},
    {l:'W',emoji:'🐋',word:'Whale',    c:['#6DD5FA','#023E8A']},
    {l:'X',emoji:'🎸',word:'Xylophone',c:['#F76BB7','#7B2FBE']},
    {l:'Y',emoji:'🧶',word:'Yarn',     c:['#FFD93D','#996600']},
    {l:'Z',emoji:'🦓',word:'Zebra',    c:['#ADB5BD','#495057']},
  ];
  var cur = 0;
  function speak(txt) { if (!window.speechSynthesis) return; window.speechSynthesis.cancel(); var u = new SpeechSynthesisUtterance(txt); u.lang='en-US'; u.rate=0.80; u.pitch=1.2; window.speechSynthesis.speak(u); }
  function speakCurrent() { var d=LETTERS[cur]; speak(d.l+'. '+d.word); var c=document.getElementById('fCard'); c.classList.remove('pulse'); void c.offsetWidth; c.classList.add('pulse'); setTimeout(function(){c.classList.remove('pulse');},600); var b=document.getElementById('listenBtn'); b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop'); setTimeout(function(){b.classList.remove('pop');},450); }
  function buildList() { var panel=document.getElementById('panel1'); LETTERS.forEach(function(d,i){ var btn=document.createElement('button'); btn.className='letter-card'; btn.style.background='linear-gradient(150deg,'+d.c[0]+','+d.c[1]+')'; btn.innerHTML='<span class="ac-upper">'+d.l+'</span><span class="ac-lower">'+d.l.toLowerCase()+'</span><span class="ac-emoji">'+d.emoji+'</span><span class="ac-word">'+d.word+'</span><span class="ac-hint">👆 tap to hear</span>'; btn.addEventListener('click',function(){ speak(d.l+'. '+d.word); btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop'); setTimeout(function(){btn.classList.remove('pop');},500); cur=i; }); panel.appendChild(btn); }); }
  function updateCard(anim) { var d=LETTERS[cur]; document.getElementById('fUpper').textContent=d.l; document.getElementById('fLower').textContent=d.l.toLowerCase(); document.getElementById('fEmoji').textContent=d.emoji; document.getElementById('fWord').textContent=d.word; document.getElementById('fCard').style.background='linear-gradient(150deg,'+d.c[0]+','+d.c[1]+')'; var pct=((cur+1)/LETTERS.length*100).toFixed(1); document.getElementById('pFill').style.width=pct+'%'; document.getElementById('pLabel').textContent=(cur+1)+' / '+LETTERS.length; if(anim){var c=document.getElementById('fCard'); c.classList.remove('flip'); void c.offsetWidth; c.classList.add('flip');} }
  function go(dir) { cur=(cur+dir+LETTERS.length)%LETTERS.length; updateCard(true); setTimeout(speakCurrent,340); }
  function switchTab(n) { document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');}); document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');}); document.getElementById('panel'+n).classList.add('active'); document.getElementById('tab'+n+'-btn').classList.add('active'); if(n===2){updateCard(false);setTimeout(speakCurrent,420);} }
  buildList(); updateCard(false);
</script>
</body>
</html>
