<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>&#129333; My Body · Baby English</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FFFDF7;
      --dark: #2B2B2B;
      --header-h: 64px;
      --tab-h: 64px;
      --accent: #FFB347;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; flex-direction: column;
      overflow-x: hidden;
    }

    /* HEADER */
    .header {
      height: var(--header-h);
      background: linear-gradient(135deg, #FFF6EE, #FFE8CC);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .header-back { text-decoration:none; font-size:26px; }
    .header-title { font-family:'Fredoka One',cursive; font-size:1.5rem; color:var(--dark); }
    .header-star  { font-size:26px; }

    /* TABS */
    .tabs {
      display:flex; background:#fff;
      border-bottom:3px solid #EEE;
      position:sticky; top:var(--header-h); z-index:99;
    }
    .tab-btn {
      flex:1; height:var(--tab-h); border:none; background:transparent;
      font-family:'Fredoka One',cursive; font-size:1.05rem; color:#AAA;
      cursor:pointer; border-bottom:4px solid transparent;
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition: color .2s, border-bottom .2s;
    }
    .tab-btn.active { color:var(--dark); border-bottom:4px solid var(--accent); }

    .panel { display:none; }
    .panel.active { display:block; }

    /* TAB 1 — GRID */
    .grid-panel { padding: 16px 14px 40px; }
    .grid-intro {
      text-align:center; font-size:0.88rem; color:#999;
      font-weight:700; margin-bottom:14px; letter-spacing:0.5px;
    }
    .body-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      max-width: 480px;
      margin: 0 auto;
    }
    .body-tile {
      border-radius: 24px;
      padding: 20px 12px 16px;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      cursor: pointer; border: none;
      user-select: none; -webkit-tap-highlight-color: transparent;
      box-shadow: 0 6px 0 rgba(0,0,0,0.13), 0 10px 24px rgba(0,0,0,0.08);
      transition: transform .12s, box-shadow .12s;
    }
    .body-tile:active {
      transform: translateY(5px) scale(0.96);
      box-shadow: 0 1px 0 rgba(0,0,0,0.13), 0 4px 12px rgba(0,0,0,0.08);
    }
    .tile-emoji {
      font-size: 56px;
      line-height: 1;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.14));
    }
    .tile-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .tile-fun {
      font-size: 0.82rem;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      text-align: center;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.14) rotate(-4deg); }
      65%  { transform: scale(0.94) rotate(3deg); }
      100% { transform: scale(1); }
    }
    .body-tile.speaking { animation: pop .5s ease; }

    /* TAB 2 — FLASHCARD */
    .flash-panel {
      padding: 16px 20px 40px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .progress-wrap { width:100%; max-width:400px; }
    .progress-track { height:10px; background:#EEE; border-radius:10px; overflow:hidden; }
    .progress-fill  { height:100%; border-radius:10px; transition:width .4s ease; }
    .progress-label { text-align:right; font-family:'Fredoka One',cursive; font-size:0.9rem; color:#BBB; margin-top:4px; }

    .flash-card {
      width:100%; max-width:340px;
      border-radius: 40px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 36px 24px 28px;
      gap: 12px;
      min-height: 360px;
      box-shadow: 0 8px 0 rgba(0,0,0,0.13), 0 20px 50px rgba(0,0,0,0.12);
      position: relative; overflow: hidden;
      cursor: pointer; user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background .4s;
    }
    .flash-card::before {
      content:'';
      position:absolute; top:-25%; left:-15%;
      width:55%; height:55%;
      background: radial-gradient(circle, rgba(255,255,255,0.32) 0%, transparent 70%);
      pointer-events:none;
    }

    .fc-big-emoji {
      font-size: 110px;
      line-height: 1;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.18));
      animation: floatEmoji 3s ease-in-out infinite;
    }
    @keyframes floatEmoji {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-12px) scale(1.06); }
    }

    .fc-body-name {
      font-family: 'Fredoka One', cursive;
      font-size: 2.8rem;
      color: white;
      text-shadow: 0 4px 10px rgba(0,0,0,0.2);
      line-height: 1;
    }
    .fc-example {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.85);
      text-align: center;
    }
    .tap-hint {
      position:absolute; bottom:14px;
      font-size:0.78rem; color:rgba(255,255,255,0.55);
      font-weight:700; letter-spacing:0.5px;
    }

    @keyframes flipIn {
      0%   { transform: rotateY(90deg) scale(0.8); opacity:0; }
      100% { transform: rotateY(0)     scale(1);   opacity:1; }
    }
    .flash-card.flip { animation: flipIn .35s ease-out; }
    @keyframes speakPulse {
      0%,100% { box-shadow: 0 8px 0 rgba(0,0,0,0.13), 0 20px 50px rgba(0,0,0,0.12); }
      50%      { box-shadow: 0 8px 0 rgba(0,0,0,0.13), 0 20px 60px rgba(0,0,0,0.2), 0 0 0 14px rgba(255,255,255,0.28); }
    }
    .flash-card.speaking-pulse { animation: speakPulse .6s ease; }

    .speak-btn {
      width:100%; max-width:340px; height:68px;
      border-radius:22px; border:none;
      background: linear-gradient(135deg,#FFB347,#FF8C00);
      font-family:'Fredoka One',cursive; font-size:1.35rem;
      color:white; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:10px;
      box-shadow: 0 5px 0 #CC6600, 0 8px 24px rgba(255,160,50,0.3);
      transition: transform .12s, box-shadow .12s;
    }
    .speak-btn:active { transform:translateY(4px); box-shadow:0 1px 0 #CC6600; }
    @keyframes btnBounce {
      0%,100% { transform:scale(1); }
      30%      { transform:scale(1.07); }
      60%      { transform:scale(0.96); }
    }
    .speak-btn.active-anim { animation: btnBounce .45s ease; }

    .flash-nav { display:flex; gap:16px; width:100%; max-width:340px; }
    .nav-btn {
      flex:1; height:58px; border-radius:18px; border:none;
      font-family:'Fredoka One',cursive; font-size:1rem;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
      box-shadow:0 4px 0 rgba(0,0,0,0.10);
      transition: transform .12s, box-shadow .12s;
    }
    .nav-btn:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,0.10); }
    .btn-prev { background:#EEE; color:#666; }
    .btn-next { background:#5BA4F5; color:white; box-shadow:0 4px 0 #2A6FCC; }
  </style>
</head>
<body>

  <header class="header">
    <a class="header-back" href="index.html">&#127968;</a>
    <span class="header-title">&#129333; My Body</span>
    <span class="header-star">&#128149;</span>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" id="tab1-btn" onclick="switchTab(1)">&#128193; All Parts</button>
    <button class="tab-btn"        id="tab2-btn" onclick="switchTab(2)">&#127183; Flashcard</button>
  </nav>

  <div class="panel active grid-panel" id="panel1">
    <p class="grid-intro">TAP A BODY PART TO HEAR IT! &#128266;</p>
    <div class="body-grid" id="bodyGrid"></div>
  </div>

  <div class="panel flash-panel" id="panel2">
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:8.3%"></div>
      </div>
      <div class="progress-label" id="progressLabel">1 / 12</div>
    </div>
    <div class="flash-card" id="flashCard" onclick="speakCurrent()">
      <div class="fc-big-emoji" id="fcEmoji">&#128064;</div>
      <div class="fc-body-name" id="fcName">Eyes</div>
      <div class="fc-example"   id="fcExample"></div>
      <div class="tap-hint">&#128070; tap to hear</div>
    </div>
    <button class="speak-btn" id="speakBtn" onclick="speakCurrent()">&#128266; Listen</button>
    <div class="flash-nav">
      <button class="nav-btn btn-prev" onclick="prevPart()">&#9664; Back</button>
      <button class="nav-btn btn-next" onclick="nextPart()">Next &#9654;</button>
    </div>
  </div>

  <script>
    const BODY = [
      { name:'Eyes',    emoji:'\u{1F440}', bg:['#5BA4F5','#0A3D91'], fun:'I see you! \u{1F440}\u2728' },
      { name:'Nose',    emoji:'\u{1F443}', bg:['#FF8E53','#923B00'], fun:'Sniff sniff! \u{1F338}\u{1F4A8}' },
      { name:'Mouth',   emoji:'\u{1F444}', bg:['#FF6B6B','#C0392B'], fun:'Say ahhh! \u{1F4AC}\u{1F604}' },
      { name:'Ears',    emoji:'\u{1F442}', bg:['#FFB347','#CC6600'], fun:'I hear music! \u{1F3B5}\u{1F442}' },
      { name:'Hair',    emoji:'\u{1F9B1}', bg:['#C77DFF','#6A0DAD'], fun:'Soft and fluffy! \u2728\u{1F9B1}' },
      { name:'Hands',   emoji:'\u{1F91C}', bg:['#6BCB77','#1A7A35'], fun:'Clap clap! \u{1F44F}\u{1F44F}' },
      { name:'Feet',    emoji:'\u{1F9B6}', bg:['#3EC9A7','#0E6B52'], fun:'Stomp stomp! \u{1F43E}\u{1F9B6}' },
      { name:'Belly',   emoji:'\u{1FAF5}', bg:['#F76BB7','#8B0050'], fun:'Tickle tickle! \u{1F606}\u2665' },
      { name:'Head',    emoji:'\u{1F9E0}', bg:['#FFD93D','#997A00'], fun:'Big brain baby! \u{1F9E0}\u2728' },
      { name:'Fingers', emoji:'\u{1F91F}', bg:['#FF6B6B','#8B0000'], fun:'One two three! \u{1F91F}\u{1F918}' },
      { name:'Toes',    emoji:'\u{1F4A5}', bg:['#6DD5FA','#0077B6'], fun:'Wiggle wiggle! \u{1F604}\u{1F9B6}' },
      { name:'Back',    emoji:'\u{1FAF3}', bg:['#C8E63C','#5A7A00'], fun:'Strong back! \u{1F4AA}\u2728' },
    ];

    let current = 0;

    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US'; u.rate = 0.80; u.pitch = 1.15;
      window.speechSynthesis.speak(u);
    }

    function speakCurrent() {
      speak(BODY[current].name);
      const card = document.getElementById('flashCard');
      card.classList.remove('speaking-pulse'); void card.offsetWidth;
      card.classList.add('speaking-pulse');
      setTimeout(() => card.classList.remove('speaking-pulse'), 700);
      const btn = document.getElementById('speakBtn');
      btn.classList.remove('active-anim'); void btn.offsetWidth;
      btn.classList.add('active-anim');
      setTimeout(() => btn.classList.remove('active-anim'), 500);
    }

    function buildGrid() {
      const grid = document.getElementById('bodyGrid');
      BODY.forEach((b, i) => {
        const tile = document.createElement('button');
        tile.className = 'body-tile';
        tile.style.background = `linear-gradient(145deg, ${b.bg[0]}, ${b.bg[1]})`;
        tile.innerHTML = `
          <span class="tile-emoji">${b.emoji}</span>
          <span class="tile-name">${b.name}</span>
          <span class="tile-fun">${b.fun}</span>
        `;
        tile.addEventListener('click', () => {
          speak(b.name);
          tile.classList.remove('speaking'); void tile.offsetWidth;
          tile.classList.add('speaking');
          setTimeout(() => tile.classList.remove('speaking'), 600);
          current = i;
        });
        grid.appendChild(tile);
      });
    }

    function updateCard(animate = true) {
      const b = BODY[current];
      document.getElementById('fcEmoji').textContent  = b.emoji;
      document.getElementById('fcName').textContent   = b.name;
      document.getElementById('fcExample').textContent = b.fun;
      document.getElementById('flashCard').style.background = `linear-gradient(145deg, ${b.bg[0]}, ${b.bg[1]})`;
      const pct = ((current + 1) / BODY.length * 100).toFixed(1);
      document.getElementById('progressFill').style.width      = pct + '%';
      document.getElementById('progressFill').style.background = `linear-gradient(90deg, ${b.bg[0]}, ${b.bg[1]})`;
      document.getElementById('progressLabel').textContent     = `${current + 1} / ${BODY.length}`;
      if (animate) {
        const card = document.getElementById('flashCard');
        card.classList.remove('flip'); void card.offsetWidth; card.classList.add('flip');
      }
    }

    function nextPart() { current = (current + 1) % BODY.length; updateCard(); setTimeout(speakCurrent, 350); }
    function prevPart() { current = (current - 1 + BODY.length) % BODY.length; updateCard(); setTimeout(speakCurrent, 350); }

    function switchTab(n) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`panel${n}`).classList.add('active');
      document.getElementById(`tab${n}-btn`).classList.add('active');
      if (n === 2) { updateCard(false); setTimeout(speakCurrent, 400); }
    }

    buildGrid();
    updateCard(false);
  </script>
</body>
</html>
