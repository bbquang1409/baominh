<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>🎨 Colors · Baby English</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg:#FFFDF7; --dark:#2B2B2B; --header-h:64px; --tab-h:60px; }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Nunito',sans-serif; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; overflow-x:hidden; }
    .header { height:var(--header-h); background:linear-gradient(135deg,#FFF8CC,#FFE8AA); display:flex; align-items:center; justify-content:space-between; padding:0 16px; position:sticky; top:0; z-index:100; box-shadow:0 2px 14px rgba(0,0,0,.10); }
    .back-btn { text-decoration:none; display:flex; align-items:center; gap:6px; background:white; border-radius:14px; padding:7px 14px 7px 10px; font-family:'Fredoka One',cursive; font-size:1rem; color:var(--dark); box-shadow:0 2px 8px rgba(0,0,0,.12); }
    .header-title { font-family:'Fredoka One',cursive; font-size:1.5rem; color:var(--dark); }
    .tabs { display:flex; background:#fff; border-bottom:3px solid #EEE; position:sticky; top:var(--header-h); z-index:99; }
    .tab-btn { flex:1; height:var(--tab-h); border:none; background:transparent; font-family:'Fredoka One',cursive; font-size:1.05rem; color:#AAA; cursor:pointer; border-bottom:4px solid transparent; display:flex; align-items:center; justify-content:center; gap:8px; transition:color .2s,border-bottom .2s; }
    .tab-btn.active { color:var(--dark); border-bottom:4px solid #FFD93D; }
    .panel { display:none; }
    .panel.active { display:block; }
    #panel2 { display:none; flex-direction:column; min-height:calc(100vh - var(--header-h) - var(--tab-h)); }
    #panel2.active { display:flex; }

    #panel1 { padding:16px 16px 48px; }
    .color-card { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; width:100%; min-height:280px; border-radius:28px; margin-bottom:16px; padding:32px 16px 28px; border:none; cursor:pointer; position:relative; overflow:hidden; box-shadow:0 6px 0 rgba(0,0,0,.14),0 10px 28px rgba(0,0,0,.10); transition:transform .13s,box-shadow .13s; -webkit-tap-highlight-color:transparent; }
    .color-card::before { content:''; position:absolute; top:-28%; left:-18%; width:56%; height:56%; background:radial-gradient(circle,rgba(255,255,255,.22) 0%,transparent 70%); pointer-events:none; }
    .color-card:active { transform:translateY(4px) scale(.97); box-shadow:0 2px 0 rgba(0,0,0,.14),0 4px 10px rgba(0,0,0,.10); }
    .ac-circle { width:110px; height:110px; border-radius:50%; border:6px solid rgba(255,255,255,.55); box-shadow:0 6px 20px rgba(0,0,0,.20),inset 0 -3px 8px rgba(0,0,0,.10); animation:floatBall 3s ease-in-out infinite; }
    @keyframes floatBall { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-10px) scale(1.05);} }
    .ac-name { font-family:'Fredoka One',cursive; font-size:2.8rem; text-shadow:0 3px 8px rgba(0,0,0,.18); }
    .ac-example { font-family:'Fredoka One',cursive; font-size:1.15rem; opacity:.82; }
    .ac-hint { font-size:.76rem; font-weight:700; letter-spacing:.5px; opacity:.50; margin-top:4px; }
    @keyframes popCard { 0%{transform:scale(1);} 35%{transform:scale(1.03);} 65%{transform:scale(.98);} 100%{transform:scale(1);} }
    .color-card.pop { animation:popCard .45s ease; }

    .progress-wrap { padding:14px 20px 0; flex-shrink:0; }
    .progress-track { height:10px; background:#EEE; border-radius:10px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:10px; transition:width .4s ease; }
    .progress-label { text-align:right; font-family:'Fredoka One',cursive; font-size:.88rem; color:#BBB; margin-top:4px; }
    .flash-row { flex:1; display:flex; align-items:center; padding:12px 0; min-height:0; }
    .side-btn { flex-shrink:0; width:58px; height:100%; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; transition:opacity .15s,transform .12s; }
    .side-btn:active { opacity:.45; transform:scale(.88); }
    .side-pill { width:44px; height:88px; background:white; border-radius:16px; box-shadow:0 4px 0 rgba(0,0,0,.10),0 6px 16px rgba(0,0,0,.07); display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
    .flash-card { flex:1; margin:0 6px; border-radius:32px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:24px 16px; box-shadow:0 8px 0 rgba(0,0,0,.13),0 18px 48px rgba(0,0,0,.12); position:relative; overflow:hidden; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:background .4s; min-height:320px; max-height:480px; }
    .flash-card::before { content:''; position:absolute; top:-25%; left:-15%; width:55%; height:55%; background:radial-gradient(circle,rgba(255,255,255,.26) 0%,transparent 70%); pointer-events:none; }
    .fc-circle { width:120px; height:120px; border-radius:50%; border:6px solid rgba(255,255,255,.55); box-shadow:0 8px 24px rgba(0,0,0,.20),inset 0 -3px 8px rgba(0,0,0,.10); animation:float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-10px) scale(1.05);} }
    .fc-name { font-family:'Fredoka One',cursive; font-size:3rem; color:white; text-shadow:0 4px 10px rgba(0,0,0,.20); line-height:1; }
    .fc-example { font-family:'Fredoka One',cursive; font-size:1.1rem; color:rgba(255,255,255,.82); }
    .fc-hint { position:absolute; bottom:14px; font-size:.74rem; color:rgba(255,255,255,.42); font-weight:700; letter-spacing:.5px; }
    @keyframes flipIn { 0%{transform:rotateY(90deg) scale(.85);opacity:0;} 100%{transform:rotateY(0) scale(1);opacity:1;} }
    .flash-card.flip { animation:flipIn .33s ease-out; }
    @keyframes pulse { 0%,100%{box-shadow:0 8px 0 rgba(0,0,0,.13),0 18px 48px rgba(0,0,0,.12);} 50%{box-shadow:0 8px 0 rgba(0,0,0,.13),0 18px 56px rgba(0,0,0,.20),0 0 0 12px rgba(255,255,255,.26);} }
    .flash-card.pulse { animation:pulse .55s ease; }
    .listen-wrap { padding:0 20px 20px; flex-shrink:0; }
    .listen-btn { width:100%; height:64px; border-radius:20px; border:none; background:linear-gradient(135deg,#FFD93D,#FFB347); font-family:'Fredoka One',cursive; font-size:1.3rem; color:#333; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 5px 0 #CC8000,0 8px 20px rgba(255,200,0,.28); transition:transform .12s,box-shadow .12s; }
    .listen-btn:active { transform:translateY(4px); box-shadow:0 1px 0 #CC8000; }
    @keyframes btnPop { 0%,100%{transform:scale(1);} 30%{transform:scale(1.06);} 60%{transform:scale(.97);} }
    .listen-btn.pop { animation:btnPop .4s ease; }
  </style>
</head>
<body>
<header class="header">
  <a class="back-btn" href="index.html">🏠 Home</a>
  <span class="header-title">🎨 Colors</span>
  <span style="font-size:26px">🌈</span>
</header>
<nav class="tabs">
  <button class="tab-btn active" id="tab1-btn" onclick="switchTab(1)">🗂️ All Colors</button>
  <button class="tab-btn"        id="tab2-btn" onclick="switchTab(2)">🃏 Flashcard</button>
</nav>
<div class="panel active" id="panel1"></div>
<div class="panel" id="panel2">
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="pFill" style="width:8.3%"></div></div>
    <div class="progress-label" id="pLabel">1 / 12</div>
  </div>
  <div class="flash-row">
    <button class="side-btn" onclick="go(-1)"><div class="side-pill">◀</div></button>
    <div class="flash-card" id="fCard" onclick="speakCurrent()">
      <div class="fc-circle"  id="fCircle"></div>
      <div class="fc-name"    id="fName">Red</div>
      <div class="fc-example" id="fExample">🍎 Apple · 🌹 Rose</div>
      <div class="fc-hint">👆 tap to hear</div>
    </div>
    <button class="side-btn" onclick="go(1)"><div class="side-pill">▶</div></button>
  </div>
  <div class="listen-wrap">
    <button class="listen-btn" id="listenBtn" onclick="speakCurrent()">🔊 Listen</button>
  </div>
</div>
<script>
  var COLORS = [
    {name:'Red',   hex:'#FF3B30',bg:['#FF6B6B','#C0392B'],tc:'white',ex:'🍎 Apple · 🌹 Rose'},
    {name:'Orange',hex:'#FF9500',bg:['#FF8E53','#D4541A'],tc:'white',ex:'🍊 Orange · 🥕 Carrot'},
    {name:'Yellow',hex:'#FFD93D',bg:['#FFE066','#E6B800'],tc:'#333', ex:'🌟 Star · 🍋 Lemon'},
    {name:'Green', hex:'#34C759',bg:['#6BCB77','#1A7A35'],tc:'white',ex:'🌿 Leaf · 🍏 Apple'},
    {name:'Blue',  hex:'#007AFF',bg:['#5BA4F5','#0A3D91'],tc:'white',ex:'🌊 Ocean · 🫐 Blueberry'},
    {name:'Purple',hex:'#AF52DE',bg:['#C77DFF','#6A0DAD'],tc:'white',ex:'🍇 Grape · 🌸 Flower'},
    {name:'Pink',  hex:'#FF2D78',bg:['#F76BB7','#A01050'],tc:'white',ex:'🌷 Tulip · 🩰 Shoe'},
    {name:'Brown', hex:'#A2845E',bg:['#C8965A','#6B4226'],tc:'white',ex:'🐻 Bear · 🍫 Chocolate'},
    {name:'White', hex:'#E0E0E0',bg:['#F0F0F0','#CCCCCC'],tc:'#555', ex:'☁️ Cloud · 🐑 Sheep'},
    {name:'Black', hex:'#1C1C1E',bg:['#555555','#111111'],tc:'white',ex:'🐱 Cat · 🌑 Moon'},
    {name:'Gray',  hex:'#8E8E93',bg:['#ADB5BD','#495057'],tc:'white',ex:'🐘 Elephant · 🌫️ Cloud'},
    {name:'Gold',  hex:'#FFD700',bg:['#FFD93D','#B8860B'],tc:'#333', ex:'⭐ Star · 👑 Crown'},
  ];
  var cur = 0;
  function speak(txt) { if (!window.speechSynthesis) return; window.speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(txt); u.lang='en-US'; u.rate=0.80; u.pitch=1.15; window.speechSynthesis.speak(u); }
  function speakCurrent() { speak(COLORS[cur].name); var c=document.getElementById('fCard'); c.classList.remove('pulse'); void c.offsetWidth; c.classList.add('pulse'); setTimeout(function(){c.classList.remove('pulse');},600); var b=document.getElementById('listenBtn'); b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop'); setTimeout(function(){b.classList.remove('pop');},450); }
  function buildList() { var panel=document.getElementById('panel1'); COLORS.forEach(function(c,i){ var btn=document.createElement('button'); btn.className='color-card'; btn.style.background='linear-gradient(150deg,'+c.bg[0]+','+c.bg[1]+')'; btn.innerHTML='<div class="ac-circle" style="background:'+c.hex+'"></div><span class="ac-name" style="color:'+c.tc+'">'+c.name+'</span><span class="ac-example" style="color:'+c.tc+'">'+c.ex+'</span><span class="ac-hint" style="color:'+c.tc+'">👆 tap to hear</span>'; btn.addEventListener('click',function(){ speak(c.name); btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop'); setTimeout(function(){btn.classList.remove('pop');},500); cur=i; }); panel.appendChild(btn); }); }
  function updateCard(anim) { var c=COLORS[cur]; document.getElementById('fCircle').style.background=c.hex; document.getElementById('fName').textContent=c.name; document.getElementById('fName').style.color=c.tc==='white'?'white':'#333'; document.getElementById('fExample').textContent=c.ex; document.getElementById('fCard').style.background='linear-gradient(150deg,'+c.bg[0]+','+c.bg[1]+')'; var pct=((cur+1)/COLORS.length*100).toFixed(1); document.getElementById('pFill').style.width=pct+'%'; document.getElementById('pFill').style.background='linear-gradient(90deg,'+c.bg[0]+','+c.bg[1]+')'; document.getElementById('pLabel').textContent=(cur+1)+' / '+COLORS.length; if(anim){var card=document.getElementById('fCard'); card.classList.remove('flip'); void card.offsetWidth; card.classList.add('flip');} }
  function go(dir) { cur=(cur+dir+COLORS.length)%COLORS.length; updateCard(true); setTimeout(speakCurrent,340); }
  function switchTab(n) { document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');}); document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');}); document.getElementById('panel'+n).classList.add('active'); document.getElementById('tab'+n+'-btn').classList.add('active'); if(n===2){updateCard(false);setTimeout(speakCurrent,420);} }
  buildList(); updateCard(false);
</script>
</body>
</html>
